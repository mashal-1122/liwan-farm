const DEF_PROTO=[{key:"open",icon:"🔓",title:"فتح وإغلاق الفعالية",color:"#2A4F32",steps:["التشييك على الفعالية في ملف الأوبن تاسك قبل الفتح","يتم فتح الفعالية الساعة 10:00 AM","يتم فتح الباب العلوي للبراندات المداومة الساعة 1:00 PM","يتم التشييك على الفعالية في ملف الكلوز تاسك الساعة 11:00 PM"]},{key:"vip",icon:"⭐",title:"بروتوكول استقبال VIP",color:"#F9A825",steps:["عمل جدول بأوقات الزيارات وإعطاء خبر للمنظمين قبلها بيوم","يتم إرشاد الضيف من النقطة (2) خارج إلى مواقف VIP","يتم إستقباله من أحمد أو عبدالله ويعمل تور كامل"]},{key:"brands",icon:"🚛",title:"آلية دخول وخروج البراندات",color:"#1A5276",steps:["دخولهم مع البوابة المخصصة لهم","بوابة دخول البراندات هي البوابة العلوية (باب المسجد)","وقت دخول الأغراض: 10:00 AM أو 1:00 PM","يتم فتح الباب الساعة 9:40 PM لمن يريد إخراج أغراضه"]},{key:"gov",icon:"🏛️",title:"آلية الجهات الحكومية",color:"#2E7D32",steps:["يتم استقبالهم من البوابة وإخبار المشرف عبدالله","الترحيب فيهم ومعاملتهم معاملة خاصة","إذا تصعد الأمر يتم التواصل مع مشعل"]},{key:"clean",icon:"🧹",title:"آلية النظافة",color:"#7B1FA2",steps:["الأوبن تاسك - وقبل صلاة العصر - وبعد صلاة المغرب - الكلوز تاسك","خارج: المواقف - الشارع - مواقف VIP - سيارات القولف","داخل: الممرات - النُزل - مجلس التسعينات - دورات المياه - المسجد - البير"]},{key:"safety",icon:"🔧",title:"آلية الصيانة والسلامة",color:"#BF360C",steps:["يتم التشييك على الخزان بداية الدوام وقبل صلاة العصر ونهاية الدوام","يتم التشييك على الكهرب بداية الدوام ونهايته","يتم التشييك على البير وعلى إقفاله"]},{key:"miss",icon:"🔍",title:"آلية إكمال النواقص",color:"#00695C",steps:["التشييك بداية الدوام ونهايته","السواير - الباجات - خرائط - القايِن - الصابون","أكياس النفايات - أدوات التنظيف والتنظيم"]}];
const PAGES=[{k:"dash",ic:"🏠",lb:"الرئيسية"},{k:"open",ic:"✅",lb:"أوبن تاسك"},{k:"close",ic:"🔒",lb:"كلوز تاسك"},{k:"att",ic:"👥",lb:"الحضور"},{k:"zones",ic:"🗺️",lb:"المناطق"},{k:"inc",ic:"📋",lb:"البلاغات"},{k:"proto",ic:"📖",lb:"البروتوكولات"},{k:"rep",ic:"📊",lb:"التقرير"},{k:"arch",ic:"🗂️",lb:"الأرشيف"},{k:"set",ic:"⚙️",lb:"الإعدادات"}];
const COLORS=["#2A4F32","#1A5276","#7A3B1E","#6C3483","#784212","#145A32","#BF360C","#00695C"];

// ══════════════ CLOUD SYNC (Firebase) ══════════════
// 👇👇 الصق إعدادات مشروع Firebase الخاص بك هنا (من Project settings) 👇👇
const firebaseConfig = {
  apiKey: "AIzaSyBMLa0Y1QRKcd8n8iHcXwvPrgbIOrNcyGU",
  authDomain: "liwan-farm.firebaseapp.com",
  projectId: "liwan-farm",
  storageBucket: "liwan-farm.firebasestorage.app",
  messagingSenderId: "992770645138",
  appId: "1:992770645138:web:963f574819ac318784da4b"
};
const CLOUD_COLLECTION = "liwan_main"; // مساحة عمل مشتركة واحدة لكل الموظفين
const SYNC_KEYS = {lw_t:"tasks",lw_c:"close",lw_a:"att",lw_i:"inc",lw_z:"zones",lw_ar:"arch",lw_st:"staff",lw_m:"mech",lw_p:"proto"};
let DB=null, applyingRemote=false, pendingRender=false;
const CLOUD_ON = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE")===-1;
if(CLOUD_ON){
  try{
    firebase.initializeApp(firebaseConfig);
    DB=firebase.firestore();
    DB.enablePersistence({synchronizeTabs:true}).catch(()=>{}); // يشتغل بدون نت ويتزامن لمّا يرجع
  }catch(e){ console.warn("Firebase init failed",e); DB=null; }
}else{ console.warn("⚠️ Firebase غير مفعّل — الصق الإعدادات لتفعيل المزامنة بين الأجهزة"); }

// ══════════════ STORAGE ══════════════
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  if(DB && !applyingRemote && SYNC_KEYS[k]){
    DB.collection(CLOUD_COLLECTION).doc(k).set({v:v,_u:Date.now()}).catch(e=>console.warn("⬆️ sync",e));
  }
}
// ── كتابة جزئية آمنة للتعديل المتزامن: تحفظ فقط الجزء المتغيّر فما يضيع تعديل موظف ثاني ──
function svMerge(lk, partialV){
  if(DB && !applyingRemote && SYNC_KEYS[lk]){
    DB.collection(CLOUD_COLLECTION).doc(lk).set({v:partialV,_u:Date.now()},{merge:true}).catch(e=>console.warn("⬆️ merge",e));
  }
}
function setSvMerge(stateKey, lk, fullVal, partialV){
  S[stateKey]=fullVal;
  try{localStorage.setItem(lk,JSON.stringify(fullVal));}catch{}
  svMerge(lk, partialV);
  render();
}
// معاملة ذرّية: تعيد قراءة آخر نسخة من السحابة ثم تطبّق تغييرنا فوقها (صفر فقدان حتى مع التعديل المتزامن)
function svTx(lk, applyToCloud){
  if(!DB || applyingRemote || !SYNC_KEYS[lk]) return;
  const stateKey=SYNC_KEYS[lk], ref=DB.collection(CLOUD_COLLECTION).doc(lk);
  DB.runTransaction(tx=>tx.get(ref).then(snap=>{
    const cur=(snap.exists && snap.data() && snap.data().v!==undefined)?snap.data().v:JSON.parse(JSON.stringify(S[stateKey]));
    applyToCloud(cur);

  ${PAGES.map(p=>`<button class="bnb ${S.pg===p.k?"on":""}" onclick="nav('${p.k}')"><span class="bnb-ic">${p.ic}</span><span class="bnb-lb">${p.lb}</span></button>`).join("")}
</nav>`;
}

setInterval(()=>{const c=document.getElementById("clk");if(c)c.innerHTML=ft()+"<br/><span style='font-size:10px;opacity:.7'>"+gday()+"</span>";},30000);
render();

// ══════════════ CLOUD REALTIME ══════════════
// إعادة الرسم بدون مقاطعة الموظف وهو يكتب في حقل
function scheduleRender(){
  const ae=document.activeElement, tag=ae&&ae.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"){pendingRender=true;return;}
  render();
}
document.addEventListener("focusout",()=>{if(pendingRender){pendingRender=false;setTimeout(render,150);}});

function startCloudSync(){
  if(!DB) return;
  const seeded={};
  Object.keys(SYNC_KEYS).forEach(k=>{
    const stateKey=SYNC_KEYS[k];
    DB.collection(CLOUD_COLLECTION).doc(k).onSnapshot(snap=>{
      if(!snap.exists){ // أول مرة: ارفع البيانات الحالية للسحابة
        if(!seeded[k]){seeded[k]=true;DB.collection(CLOUD_COLLECTION).doc(k).set({v:S[stateKey],_u:Date.now()}).catch(()=>{});}
        return;
      }
      const data=snap.data(); if(!data||data.v===undefined) return;
      applyingRemote=true;
      S[stateKey]=data.v;
      try{localStorage.setItem(k,JSON.stringify(data.v));}catch{}
      applyingRemote=false;
      scheduleRender();
    },err=>console.warn("⬇️ sync",err));
  });
}
startCloudSync();
</script>
